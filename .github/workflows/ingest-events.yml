name: Refresh Queens events

on:
  workflow_dispatch:
  schedule:
    - cron: '17 9 * * *'

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run ingest
      - run: npm run check:release
      - name: Commit catalog changes
        run: |
          git config user.name "queens-calendar-bot"
          git config user.email "queens-calendar-bot@users.noreply.github.com"
          git add src/data/generated
          git diff --cached --quiet || git commit -m "data: refresh Queens events"
          git push
